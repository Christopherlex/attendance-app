<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Indo Citra Attendance · Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f1f5f9;
      font-family: 'Inter', sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
    }
    .brand img {
      width: 44px;
      height: 44px;
      object-fit: contain;
    }
    .brand-name {
      font-size: 1rem;
      font-weight: 700;
      color: #0f1f3d;
      line-height: 1.3;
    }

    .card h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #0f1f3d;
      margin-bottom: 0.25rem;
    }
    .card p {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 1.75rem;
    }

    .field { margin-bottom: 1rem; }
    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: #475569;
      margin-bottom: 0.4rem;
    }
    .field input {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      color: #0f1f3d;
      background: #f8fafc;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
      background: #fff;
    }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 0.7rem 0.9rem;
      color: #ef4444;
      font-size: 0.82rem;
      margin-bottom: 1rem;
    }

    .btn-login {
      width: 100%;
      padding: 0.75rem;
      background: #0f1f3d;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.25rem;
      transition: background 0.2s;
    }
    .btn-login:hover { background: #1a3260; }

    .footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo"/>
      <span class="brand-name">Indo Citra<br/>Attendance</span>
    </div>

    <h2>Sign In</h2>
    <p>Enter your credentials to continue</p>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username"/>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn-login">Sign In</button>
    </form>

    <div class="footer">Indo Citra Attendance Management System</div>
  </div>
</body>
</html>
